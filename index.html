<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Tri Kien - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .card { border: 1px solid #e2e8f0; transition: all 0.3s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-extrabold mb-8 text-center text-blue-600">HỆ THỐNG QUẢN LÝ SHOP</h1>

        <div id="auth-section" class="max-w-md mx-auto bg-slate-100 p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4">Đăng nhập hệ thống</h2>
            <input type="email" id="email" placeholder="Email" class="border p-2 w-full mb-3 rounded">
            <input type="password" id="password" placeholder="Mật khẩu" class="border p-2 w-full mb-4 rounded">
            <div class="flex gap-2">
                <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Đăng nhập</button>
                <button onclick="handleAuth('register')" class="flex-1 bg-gray-500 text-white py-2 rounded hover:bg-gray-600">Đăng ký</button>
            </div>
        </div>

        <div id="main-content" class="hidden">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <p class="text-gray-600">Tài khoản: <span id="user-email" class="font-bold text-blue-600"></span></p>
                <button onclick="logout()" class="bg-red-100 text-red-600 px-4 py-1 rounded-full hover:bg-red-200 transition">Đăng xuất</button>
            </div>

            <div id="admin-panel" class="hidden mb-10">
                <h2 class="text-2xl font-bold text-red-600 mb-4 flex items-center gap-2">
                    <span>🛠️</span> QUẢN TRỊ VIÊN
                </h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-red-50 p-6 rounded-xl border border-red-100">
                        <h3 class="font-bold mb-4">Thêm Sản Phẩm Mới</h3>
                        <div class="space-y-3">
                            <input type="text" id="asset-name" placeholder="Tên sản phẩm (VD: UgPhone VIP 1)" class="w-full border p-2 rounded">
                            <input type="number" id="asset-stock" placeholder="Số lượng" class="w-full border p-2 rounded">
                            <textarea id="asset-content" placeholder="Nội dung bí mật (Local máy / Link Acc)" class="w-full border p-2 rounded h-20"></textarea>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <select id="asset-type" class="border p-2 rounded">
                                    <option value="ugphone">Loại: UgPhone</option>
                                    <option value="bloxfruits">Loại: Blox Fruits</option>
                                </select>
                                <select id="link-type" class="border p-2 rounded">
                                    <option value="link4sub">Link: Link4Sub</option>
                                    <option value="link4m">Link: Link4M (Sắp có)</option>
                                </select>
                            </div>
                            <button onclick="addAsset()" class="w-full bg-red-600 text-white py-2 rounded font-bold hover:bg-red-700">ĐĂNG BÁN</button>
                        </div>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                        <h3 class="font-bold mb-4">Kho Hàng Hiện Tại</h3>
                        <div id="admin-asset-list" class="space-y-2 h-[300px] overflow-y-auto pr-2">
                            </div>
                    </div>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-2xl font-bold mb-6 text-gray-800 border-l-4 border-blue-600 pl-3">Cửa Hàng Sản Phẩm</h3>
                <div id="user-asset-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="reward-box" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center">
                    <div class="text-5xl mb-4">🎁</div>
                    <h3 class="text-xl font-bold mb-2">Vượt link thành công!</h3>
                    <p class="text-gray-600 mb-4">Đây là thông tin của bạn:</p>
                    <div id="reward-text" class="bg-slate-100 p-4 rounded-lg font-mono text-blue-700 break-all mb-4"></div>
                    <button onclick="document.getElementById('reward-box').classList.add('hidden')" class="w-full bg-blue-600 text-white py-2 rounded">Đóng</button>
                </div>
            </div>

            <div class="mt-12 bg-slate-900 rounded-xl p-6 text-white">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="text-green-400">●</span> Lịch sử hoạt động
                </h3>
                <div id="history-list" class="space-y-2 font-mono text-sm h-40 overflow-y-auto text-gray-300">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, serverTimestamp, updateDoc, increment } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfge8mXfEn_PgmrK3HYtNzOsbSdShn6_g",
            authDomain: "skibidi-37b6d.firebaseapp.com",
            projectId: "skibidi-37b6d",
            appId: "1:1087339530724:web:1a175582477528c8a99ff1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "trikien14012013@gmail.com"; 

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (type === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (error) { alert("Lỗi: " + error.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadAdminAssets();
                }
                loadUserAssets();
                loadHistory();
                checkVerification();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // ADMIN: THÊM HÀNG
        window.addAsset = async () => {
            const name = document.getElementById('asset-name').value;
            const stock = parseInt(document.getElementById('asset-stock').value);
            const content = document.getElementById('asset-content').value;
            const type = document.getElementById('asset-type').value;
            const linkType = document.getElementById('link-type').value;

            if (!name || isNaN(stock) || !content) return alert("Điền đủ thông tin!");

            await addDoc(collection(db, "assets"), {
                name, stock, content, type, linkType,
                createdAt: serverTimestamp()
            });

            // Reset form
            document.getElementById('asset-name').value = '';
            document.getElementById('asset-stock').value = '';
            document.getElementById('asset-content').value = '';
            
            loadAdminAssets();
            loadUserAssets();
        };

        // ADMIN: LOAD DANH SÁCH (THẤY CẢ NỘI DUNG)
        async function loadAdminAssets() {
            const snap = await getDocs(collection(db, "assets"));
            const container = document.getElementById('admin-asset-list');
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="bg-white p-3 border rounded shadow-sm flex flex-col gap-1">
                        <div class="flex justify-between font-bold">
                            <span>[${data.type.toUpperCase()}] ${data.name}</span>
                            <span class="text-red-500">SL: ${data.stock}</span>
                        </div>
                        <p class="text-xs text-gray-500 italic">Nội dung: ${data.content}</p>
                        <div class="flex justify-end gap-2 mt-1">
                             <button onclick="deleteAsset('${d.id}')" class="text-xs text-red-500 underline">Xóa vĩnh viễn</button>
                        </div>
                    </div>`;
            });
        }

        window.deleteAsset = async (id) => {
            if(confirm("Xóa món này?")) {
                await deleteDoc(doc(db, "assets", id));
                loadAdminAssets();
                loadUserAssets();
            }
        };

        // USER: LOAD SHOP (ẨN MÓN HẾT HÀNG)
        async function loadUserAssets() {
            const snap = await getDocs(collection(db, "assets"));
            const container = document.getElementById('user-asset-list');
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                if (data.stock <= 0) return; // Ẩn nếu hết hàng

                container.innerHTML += `
                    <div class="card bg-white p-5 rounded-xl border border-slate-200">
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-blue-100 text-blue-600 text-xs font-bold px-2 py-1 rounded">${data.type.toUpperCase()}</span>
                            <span class="text-sm font-medium text-gray-500">Còn lại: ${data.stock}</span>
                        </div>
                        <h4 class="text-lg font-bold text-gray-800 mb-4">${data.name}</h4>
                        <button onclick="handleBuy('${d.id}', '${data.linkType}')" 
                                class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-black transition">
                            Vượt Link Để Lấy
                        </button>
                    </div>`;
            });
        }

        // XỬ LÝ KHI BẤM "MUA" (VƯỢT LINK)
        window.handleBuy = (id, linkType) => {
            // Lưu lại ID món hàng đang định lấy
            localStorage.setItem('pending_asset_id', id);
            
            // Tạo mã xác minh chống bypass
            const token = "TRIKIEN_" + Math.random().toString(36).substring(7).toUpperCase();
            localStorage.setItem('pending_verify', token);
            
            // Ở đây mình dùng link của bạn cung cấp
            // Sau này bạn có thể làm nhiều link khác nhau dựa vào linkType
            const shortlinkUrl = `https://link4sub.com/uuwz9avd6mqg`; 
            
            alert(`Hệ thống đang chuyển hướng qua ${linkType}. Sau khi hoàn thành, bạn sẽ tự động nhận nội dung!`);
            window.location.href = shortlinkUrl;
        };

        // KIỂM TRA SAU KHI VƯỢT LINK QUAY LẠI
        async function checkVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const verifyToken = urlParams.get('verify');
            const savedToken = localStorage.getItem('pending_verify');
            const assetId = localStorage.getItem('pending_asset_id');

            if (verifyToken && verifyToken === "TOKEN" && assetId) { // Vì link của bạn đang để cứng là ?verify=TOKEN
                
                // 1. Lấy thông tin món hàng
                const assetRef = doc(db, "assets", assetId);
                const assetSnap = await getDocs(query(collection(db, "assets"))); 
                
                // Tìm đúng document trong list (vì lấy lẻ doc cần quyền hoặc cấu trúc chuẩn hơn)
                let itemData = null;
                assetSnap.forEach(doc => { if(doc.id === assetId) itemData = doc.data(); });

                if (itemData && itemData.stock > 0) {
                    // 2. Trừ số lượng trong kho
                    await updateDoc(assetRef, { stock: increment(-1) });

                    // 3. Hiển thị quà
                    document.getElementById('reward-box').classList.remove('hidden');
                    document.getElementById('reward-text').innerText = itemData.content;

                    // 4. Lưu lịch sử
                    await addDoc(collection(db, "history"), {
                        uid: auth.currentUser.uid,
                        email: auth.currentUser.email,
                        content: `Vượt link nhận: ${itemData.name}`,
                        type: "SUCCESS",
                        time: serverTimestamp()
                    });

                    // Dọn dẹp
                    localStorage.removeItem('pending_asset_id');
                    localStorage.removeItem('pending_verify');
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    loadUserAssets();
                    loadHistory();
                }
            }
        }

        async function loadHistory() {
            const q = query(collection(db, "history"), where("uid", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `<p class="border-b border-white/10 pb-1">> ${data.content}</p>`;
            });
        }
    </script>
</body>
</html>
