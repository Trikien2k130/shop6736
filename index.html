<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Asset & UgPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div id="app" class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-5 text-center">Hệ Thống Bán Hàng & UgPhone</h1>

        <div id="auth-section">
            <h2 class="text-xl font-semibold mb-3">Đăng nhập / Đăng ký</h2>
            <input type="email" id="email" placeholder="Email" class="border p-2 w-full mb-2">
            <input type="password" id="password" placeholder="Mật khẩu" class="border p-2 w-full mb-4">
            <button onclick="handleAuth('login')" class="bg-blue-500 text-white px-4 py-2 rounded">Đăng nhập</button>
            <button onclick="handleAuth('register')" class="bg-green-500 text-white px-4 py-2 rounded">Đăng ký</button>
        </div>

        <div id="main-content" class="hidden">
            <div class="flex justify-between items-center mb-5">
                <p>Xin chào: <span id="user-email" class="font-bold"></span></p>
                <button onclick="logout()" class="text-red-500 underline">Đăng xuất</button>
            </div>

            <div id="admin-panel" class="hidden border-2 border-red-200 p-4 mb-5 bg-red-50">
                <h3 class="font-bold text-red-600 mb-2 text-lg">Quản lý Admin</h3>
                <input type="text" id="asset-name" placeholder="Tên món hàng" class="border p-2 mb-2 w-full">
                <button onclick="addAsset()" class="bg-red-500 text-white px-4 py-2 rounded">Thêm món hàng</button>
                <div id="admin-asset-list" class="mt-4"></div>
            </div>

            <div class="mb-10">
                <h3 class="text-xl font-bold mb-3">Cửa hàng</h3>
                <div id="user-asset-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="border-t pt-5 text-center">
                <h3 class="text-lg font-semibold mb-3">Nhận quà máy UgPhone</h3>
                <a href="#" onclick="startShortlink(event)">
                    <img src="https://www.ugphone.com/toc-portal/assets/ugphone-logo.b5e3e8d7.png" alt="UgPhone" class="mx-auto w-48 hover:opacity-80 transition cursor-pointer">
                </a>
                <div id="reward-box" class="hidden mt-4 p-4 bg-yellow-100 border border-yellow-400 text-yellow-800 font-mono">
                    Đoạn văn bản: <span id="reward-text" class="font-bold text-lg"></span>
                </div>
            </div>

            <div class="mt-10">
                <h3 class="text-xl font-bold mb-3 text-gray-700">Lịch sử hoạt động</h3>
                <div id="history-list" class="text-sm bg-gray-50 p-4 rounded h-40 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // Cấu hình của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDfge8mXfEn_PgmrK3HYtNzOsbSdShn6_g",
            authDomain: "skibidi-37b6d.firebaseapp.com",
            projectId: "skibidi-37b6d",
            appId: "1:1087339530724:web:1a175582477528c8a99ff1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ĐỊNH NGHĨA ADMIN (Thay Email này bằng email admin của bạn)
        const ADMIN_EMAIL = "trikien14012013@gmail.com"; 

        // 1. Quản lý Đăng nhập / Đăng ký
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (type === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
            } catch (error) { alert(error.message); }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                    loadAdminAssets();
                }
                loadUserAssets();
                loadHistory();
                checkVượtLink(); // Kiểm tra xem vừa mới vượt link xong hay không
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // 2. Quản lý Hàng hóa (Admin)
        window.addAsset = async () => {
            const name = document.getElementById('asset-name').value;
            if (!name) return;
            await addDoc(collection(db, "assets"), { name, createdAt: serverTimestamp() });
            document.getElementById('asset-name').value = '';
            loadAdminAssets();
            loadUserAssets();
        };

        async function loadAdminAssets() {
            const snap = await getDocs(collection(db, "assets"));
            const container = document.getElementById('admin-asset-list');
            container.innerHTML = '';
            snap.forEach(d => {
                container.innerHTML += `
                    <div class="flex justify-between bg-white p-2 mb-1 border">
                        <span>${d.data().name}</span>
                        <button onclick="deleteAsset('${d.id}')" class="text-red-500 font-bold">Xóa</button>
                    </div>`;
            });
        }

        window.deleteAsset = async (id) => {
            await deleteDoc(doc(db, "assets", id));
            loadAdminAssets();
            loadUserAssets();
        };

        // 3. Hiển thị cho User
        async function loadUserAssets() {
            const snap = await getDocs(collection(db, "assets"));
            const container = document.getElementById('user-asset-list');
            container.innerHTML = '';
            snap.forEach(d => {
                container.innerHTML += `
                    <div class="card bg-blue-50 border-blue-200">
                        <p class="font-bold">${d.data().name}</p>
                        <button onclick="buyAsset('${d.data().name}')" class="mt-2 text-sm bg-blue-600 text-white px-3 py-1 rounded">Mua ngay</button>
                    </div>`;
            });
        }

        window.buyAsset = async (name) => {
            await addDoc(collection(db, "history"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                type: "MUA HÀNG",
                content: `Đã mua: ${name}`,
                time: serverTimestamp()
            });
            alert("Đã mua thành công!");
            loadHistory();
        };

        // 4. Hệ thống Vượt Link (Logic Anti-Bypass)
        window.startShortlink = (e) => {
            e.preventDefault();
            // Tạo 1 token ngẫu nhiên để xác minh khi quay lại
            const token = Math.random().toString(36).substring(7);
            localStorage.setItem('pending_verify', token);
            
            // Link vượt link (Ở đây bạn thay bằng link rút gọn của bạn)
            // Cấu hình trang đích sau khi vượt link là: URL_CUA_BAN?token=TOKEN_CỦA_BẠN
            const shortlinkUrl = `https://your-shortlink.com/redirect?dest=${encodeURIComponent(window.location.origin + window.location.pathname + '?verify=' + token)}`;
            
            window.location.href = shortlinkUrl;
        };

        async function checkVượtLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const verifyToken = urlParams.get('verify');
            const savedToken = localStorage.getItem('pending_verify');

            // Chống bypass: Token trong URL phải khớp với Token đã lưu trong máy trước khi đi
            if (verifyToken && verifyToken === savedToken) {
                // Xóa token để không dùng lại được lần 2 (Anti-replay)
                localStorage.removeItem('pending_verify');
                // Xóa param trên URL cho đẹp
                window.history.replaceState({}, document.title, window.location.pathname);

                // Hiển thị đoạn văn bản
                document.getElementById('reward-box').classList.remove('hidden');
                document.getElementById('reward-text').innerText = "local máy ugphone - [SECRET-KEY-123]";

                // Lưu vào lịch sử
                await addDoc(collection(db, "history"), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    type: "VƯỢT LINK",
                    content: "Đã vượt link nhận quà UgPhone",
                    time: serverTimestamp()
                });
                loadHistory();
            }
        }

        // 5. Lịch sử
        async function loadHistory() {
            const q = query(collection(db, "history"), where("uid", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `<p class="border-b mb-1">[${data.type}] ${data.content}</p>`;
            });
        }
    </script>
</body>
</html>
